<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitVision - AI Virtual Wardrobe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">FitVision</h1>
        <p class="text-center mb-5">Upload a photo of clothing to virtually try it on!</p>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="file" class="form-label">Upload Clothing Image</label>
                                <input class="form-control" type="file" name="file" id="file" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Try It On!</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
